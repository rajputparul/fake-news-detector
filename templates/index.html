<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
            margin-top: 80px;
        }

        .container {
            background: white;
            color: black;
            width: 50%;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        textarea {
            width: 90%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📰 Fake News Detection</h1>

        <form action="/predict" method="post">
            <textarea name="news" rows="5" placeholder="Enter news here..."></textarea><br><br>
            <button type="submit">Check News</button>
        </form>

        <div class="result">
            {{ prediction_text | safe }}
        </div>
    </div>

</body>
</html>
